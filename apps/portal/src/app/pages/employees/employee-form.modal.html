<div class="modal-container">
  <div class="modal-header">
    <h2>{{ isEdit ? 'Sửa nhân viên' : 'Tạo nhân viên mới' }}</h2>
    <button class="btn-close" (click)="onCancel()" type="button">
      <ion-icon name="close-outline"></ion-icon>
    </button>
  </div>

  <div class="modal-content">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" id="employee-form">
      <div class="form-group">
        <label for="empEmail">Email đăng nhập</label>
        <input
          id="empEmail"
          type="email"
          formControlName="email"
          placeholder="Ví dụ: dn-haichau-emp-026@demo.com"
        />
      </div>

      @if (!isEdit) {
      <div class="form-group">
        <label for="empPassword">Mật khẩu</label>
        <input
          id="empPassword"
          type="password"
          formControlName="password"
          placeholder="Tối thiểu 8 ký tự"
        />
      </div>
      }

      <div class="form-group">
        <label for="empName">Họ tên</label>
        <input
          id="empName"
          type="text"
          formControlName="full_name"
          placeholder="Nhập họ và tên đầy đủ"
        />
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px">
        <div class="form-group">
          <label for="empPhone">Điện thoại</label>
          <input
            id="empPhone"
            type="text"
            formControlName="phone"
            placeholder="Số điện thoại liên lạc"
          />
        </div>

        <div class="form-group">
          <label for="empCode">Mã nhân viên</label>
          <input
            id="empCode"
            type="text"
            formControlName="employee_code"
            placeholder="Ví dụ: DN-HaiChau-EMP-026"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="empBranch">Chi nhánh chính</label>
        <select id="empBranch" formControlName="primary_branch_id">
          <option value="" disabled selected>Chọn chi nhánh...</option>
          @for (b of branches; track b.id) {
          <option [value]="b.id">{{ b.code }} — {{ b.name }}</option>
          }
        </select>
      </div>

      @if (!isEdit) {
      <div class="form-group">
        <label for="empRole">Vai trò hệ thống</label>
        <select id="empRole" formControlName="role">
          <option value="employee">Nhân viên (Employee)</option>
          <option value="manager">Quản lý (Manager)</option>
          <option value="admin">Quản trị viên (Admin)</option>
        </select>
      </div>
      }
    </form>
  </div>

  <div class="modal-footer">
    <button
      type="button"
      class="btn-cancel"
      (click)="onCancel()"
      [disabled]="loading()"
    >
      Hủy
    </button>
    <button
      type="submit"
      form="employee-form"
      class="btn-submit"
      [disabled]="form.invalid || loading()"
    >
      @if (loading()) {
      <ion-icon name="sync-outline"></ion-icon>
      } @else { {{ isEdit ? 'Lưu thay đổi' : 'Tạo mới' }} }
    </button>
  </div>
</div>
