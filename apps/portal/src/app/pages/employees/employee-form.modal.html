<ion-header>
  <ion-toolbar color="primary">
    <ion-title>{{ isEdit ? 'Sửa nhân viên' : 'Tạo nhân viên' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="onCancel()">Hủy</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <ion-item>
      <ion-input
        label="Email"
        labelPlacement="floating"
        type="email"
        formControlName="email"
      ></ion-input>
    </ion-item>
    @if (!isEdit) {
    <ion-item>
      <ion-input
        label="Mật khẩu (≥8 ký tự)"
        labelPlacement="floating"
        type="password"
        formControlName="password"
      ></ion-input>
    </ion-item>
    }
    <ion-item>
      <ion-input
        label="Họ tên"
        labelPlacement="floating"
        formControlName="full_name"
      ></ion-input>
    </ion-item>
    <ion-item>
      <ion-input
        label="Điện thoại"
        labelPlacement="floating"
        formControlName="phone"
      ></ion-input>
    </ion-item>
    <ion-item>
      <ion-input
        label="Mã nhân viên"
        labelPlacement="floating"
        formControlName="employee_code"
      ></ion-input>
    </ion-item>
    <ion-item>
      <ion-select
        label="Chi nhánh chính"
        labelPlacement="floating"
        formControlName="primary_branch_id"
      >
        @for (b of branches; track b.id) {
        <ion-select-option [value]="b.id"
          >{{ b.code }} — {{ b.name }}</ion-select-option
        >
        }
      </ion-select>
    </ion-item>
    @if (!isEdit) {
    <ion-item>
      <ion-select
        label="Vai trò"
        labelPlacement="floating"
        formControlName="role"
      >
        <ion-select-option value="employee">Employee</ion-select-option>
        <ion-select-option value="manager">Manager</ion-select-option>
        <ion-select-option value="admin">Admin</ion-select-option>
      </ion-select>
    </ion-item>
    }
    <br />
    <ion-button
      expand="block"
      type="submit"
      [disabled]="form.invalid || loading()"
    >
      @if (loading()) {
      <ion-spinner name="crescent"></ion-spinner>
      } @else { {{ isEdit ? 'Lưu thay đổi' : 'Tạo' }} }
    </ion-button>
  </form>
</ion-content>
