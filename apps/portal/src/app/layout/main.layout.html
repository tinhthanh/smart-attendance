<div class="app-container">
  <!-- Static Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-wrap w-2 h-2">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <g id="logo-f">
    <!-- Thanh ngang phía trên (Màu xanh ngọc sáng) -->
    <polygon points="130,35 390,35 450,145 190,145" fill="#47BAC1" />
    
    <!-- Thân dọc chính (Màu xanh dương) -->
    <polygon points="190,145 50,405 130,465 260,245" fill="#208BDE" />
    
    <!-- Phần bóng đổ tạo nếp gấp (Màu xanh ngọc đậm) -->
    <polygon points="260,245 220,355 195,355" fill="#3197A7" />
    
    <!-- Thanh ngang ở giữa (Màu xanh ngọc sáng) -->
    <polygon points="260,245 390,245 350,355 220,355" fill="#47BAC1" />
  </g>
</svg>
        <h1>Smart Attendance</h1>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="selected">
        <iconify-icon icon="solar:chart-square-bold" width="22" height="22"></iconify-icon>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/branches" routerLinkActive="selected">
        <iconify-icon icon="solar:buildings-bold" width="22" height="22"></iconify-icon>
        <span>Chi nhánh</span>
      </a>
      <a class="nav-item" routerLink="/employees" routerLinkActive="selected">
        <iconify-icon icon="solar:users-group-rounded-bold" width="22" height="22"></iconify-icon>
        <span>Nhân viên</span>
      </a>
      <a class="nav-item" routerLink="/attendance" routerLinkActive="selected">
        <iconify-icon icon="solar:clock-circle-bold" width="22" height="22"></iconify-icon>
        <span>Chấm công</span>
      </a>
      <a class="nav-item" routerLink="/anomalies" routerLinkActive="selected">
        <iconify-icon icon="solar:danger-triangle-bold" width="22" height="22"></iconify-icon>
        <span>Bất thường</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content-area">
    <!-- Topbar -->
    <header class="topbar">
      @if (auth.currentUser(); as user) {
      <div class="user-badge">
        <div class="user-avatar">
          <iconify-icon icon="solar:user-circle-bold" width="32" height="32" style="color: var(--sage-600);"></iconify-icon>
        </div>
        <span class="user-label">{{ userLabel() }}</span>
        <button
          class="btn-logout"
          (click)="onLogout()"
          aria-label="Đăng xuất"
          title="Đăng xuất"
        >
          <iconify-icon icon="solar:logout-2-bold" width="20" height="20"></iconify-icon>
        </button>
      </div>
      }
    </header>

    <!-- Router Content -->
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
