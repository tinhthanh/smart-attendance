<div class="app-container">
  <!-- Static Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Smart Attendance</h1>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="selected">
        <ion-icon name="home-outline"></ion-icon>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/branches" routerLinkActive="selected">
        <ion-icon name="business-outline"></ion-icon>
        <span>Chi nhánh</span>
      </a>
      <a class="nav-item" routerLink="/employees" routerLinkActive="selected">
        <ion-icon name="people-outline"></ion-icon>
        <span>Nhân viên</span>
      </a>
      <a class="nav-item" routerLink="/attendance" routerLinkActive="selected">
        <ion-icon name="time-outline"></ion-icon>
        <span>Chấm công</span>
      </a>
      <a class="nav-item" routerLink="/anomalies" routerLinkActive="selected">
        <ion-icon name="alert-circle-outline"></ion-icon>
        <span>Bất thường</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content-area">
    <!-- Topbar -->
    <header class="topbar">
      @if (auth.currentUser(); as user) {
      <div class="user-badge">
        <span class="user-label">{{ userLabel() }}</span>
        <button
          class="btn-logout"
          (click)="onLogout()"
          aria-label="Đăng xuất"
          title="Đăng xuất"
        >
          <ion-icon name="log-out-outline"></ion-icon>
        </button>
      </div>
      }
    </header>

    <!-- Router Content -->
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
