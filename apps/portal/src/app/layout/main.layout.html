<ion-split-pane contentId="main-content">
  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Smart Attendance</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list>
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/dashboard" routerLinkActive="selected">
            <ion-icon slot="start" name="home-outline"></ion-icon>
            <ion-label>Dashboard</ion-label>
          </ion-item>
          <ion-item routerLink="/branches" routerLinkActive="selected">
            <ion-icon slot="start" name="business-outline"></ion-icon>
            <ion-label>Chi nhánh</ion-label>
          </ion-item>
          <ion-item routerLink="/employees" routerLinkActive="selected">
            <ion-icon slot="start" name="people-outline"></ion-icon>
            <ion-label>Nhân viên</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
    @if (auth.currentUser(); as user) {
    <ion-toolbar>
      <ion-chip color="tertiary">
        <ion-label>{{ userLabel() }}</ion-label>
      </ion-chip>
      <ion-button slot="end" fill="clear" (click)="onLogout()">
        <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-toolbar>
    }
  </ion-menu>
  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-split-pane>
